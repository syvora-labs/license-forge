services:
  studio:
    container_name: supabase-studio
    image: supabase/studio:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION:-License Forge}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT:-license-forge}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL:-http://localhost:8000}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      HOSTNAME: 0.0.0.0
    healthcheck:
      test:
        - CMD-SHELL
        - |
          node -e "
            const http = require('http');
            const req = http.get('http://localhost:3000/api/platform/profile', r => process.exit(r.statusCode === 200 ? 0 : 1));
            req.on('error', () => process.exit(1));
            req.setTimeout(4000, () => { req.destroy(); process.exit(1); });
          "
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - meta

  kong:
    container_name: supabase-kong
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8000:8000/tcp"
      - "8443:8443/tcp"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/temp.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-supabase}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-this_password_is_insecure_and_should_be_updated}
    volumes:
      - ./supabase/kong.yml:/home/kong/temp.yml:ro
    depends_on:
      - auth
      - rest
      - realtime
      - storage
      - functions

  auth:
    container_name: supabase-auth
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY:-3600}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP:-true}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-inbucket}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-2500}
      GOTRUE_SMTP_USER: ${SMTP_USER:-fake@example.com}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-fake_mail_password}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-fake_sender}
      GOTRUE_MAILER_URLPATHS_INVITE: ${MAILER_URLPATHS_INVITE:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}
    depends_on:
      db-init:
        condition: service_completed_successfully

  rest:
    container_name: supabase-rest
    image: postgrest/postgrest:v12.0.2
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public,storage,graphql_public}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY:-3600}
    depends_on:
      db-init:
        condition: service_completed_successfully

  realtime:
    container_name: supabase-realtime
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-postgres}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      APP_NAME: realtime
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      RLIMIT_NOFILE: ""
    command: >
      sh -c "/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server"
    depends_on:
      db-init:
        condition: service_completed_successfully

  storage:
    container_name: supabase-storage
    image: supabase/storage-api:v1.11.2
    restart: unless-stopped
    volumes:
      - storage-data:/var/lib/storage
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    depends_on:
      db-init:
        condition: service_completed_successfully
      rest:
        condition: service_started

  imgproxy:
    container_name: supabase-imgproxy
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION:-true}
    volumes:
      - storage-data:/var/lib/storage:ro

  meta:
    container_name: supabase-meta
    image: supabase/postgres-meta:v0.83.2
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy

  functions:
    container_name: supabase-edge-functions
    image: supabase/edge-runtime:v1.67.4
    restart: unless-stopped
    volumes:
      - ./supabase/functions:/home/deno/functions:Z
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-postgres}
      VERIFY_JWT: ${FUNCTIONS_VERIFY_JWT:-false}
    command: start --main-service /home/deno/functions/main
    depends_on:
      db:
        condition: service_healthy

  inbucket:
    container_name: supabase-inbucket
    image: inbucket/inbucket:stable
    restart: unless-stopped
    ports:
      - "54324:9000"  # web UI
      - "54325:2500"  # SMTP

  db:
    container_name: supabase-db
    image: supabase/postgres:15.1.1.41
    restart: unless-stopped
    ports:
      - "54322:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:Z
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY:-3600}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost && psql -U postgres -h localhost -At -c 'SELECT pg_is_in_recovery()' | grep -q f"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s

  db-init:
    container_name: supabase-db-init
    image: supabase/postgres:15.1.1.41
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command:
      - bash
      - -c
      - |
        set -e

        # Wait for the DB to be fully ready — pg_isready is not enough because the
        # supabase/postgres image restarts postgres internally during its init phase.
        # We wait until we can actually execute a query and the DB is not in recovery.
        echo "Waiting for db to be ready..."
        until psql -h db -U postgres -c "SELECT 1" -o /dev/null 2>/dev/null; do sleep 2; done
        until [ "$(psql -h db -U postgres -At -c "SELECT pg_is_in_recovery();" 2>/dev/null)" = "f" ]; do sleep 2; done
        echo "DB ready."

        # 1. Sync internal role passwords.
        # The supabase/postgres image creates these roles without passwords, but
        # pg_hba.conf requires scram-sha-256 for all Docker network connections.
        psql -h db -U postgres -c "ALTER USER supabase_auth_admin    WITH PASSWORD '${POSTGRES_PASSWORD:-postgres}'"
        psql -h db -U postgres -c "ALTER USER authenticator          WITH PASSWORD '${POSTGRES_PASSWORD:-postgres}'"
        psql -h db -U postgres -c "ALTER USER supabase_storage_admin WITH PASSWORD '${POSTGRES_PASSWORD:-postgres}'"

        # 2. Create _realtime schema (realtime sets search_path before running its own migrations).
        psql -h db -U postgres -c "CREATE SCHEMA IF NOT EXISTS _realtime"
        psql -h db -U postgres -c "GRANT ALL ON SCHEMA _realtime TO supabase_admin"

        # 3. Transfer auth schema + function ownership so GoTrue can run migrations.
        psql -h db -U postgres -c "ALTER SCHEMA auth OWNER TO supabase_auth_admin"
        psql -h db -U postgres -At -c "
          SELECT 'ALTER FUNCTION auth.' || quote_ident(p.proname)
                 || '(' || pg_get_function_identity_arguments(p.oid) || ')'
                 || ' OWNER TO supabase_auth_admin'
          FROM pg_proc p
          JOIN pg_namespace n ON n.oid = p.pronamespace
          WHERE n.nspname = 'auth'
        " | psql -h db -U postgres

        echo "db-init complete"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
  storage-data:
